name: Weekly Icebreak Automation

on:
  schedule:
    - cron: '0 0 * * 3' # 毎週水曜日 09:00 JST (00:00 UTC)
  workflow_dispatch: # 手動実行用

# ページデプロイの同時実行を制御
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget unzip fontconfig locales gwenview
          sudo fc-cache -fv

      - name: Run script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js

      - name: Commit and Push changes (Source Code only)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html || true
          # 画像ディレクトリがあれば追加
          [ -d "docs/output" ] && git add docs/output/*.png || true
          git commit -m "docs: update weekly icebreak slides [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

  # 新規: GitHub Pagesへのデプロイジョブ (404対策)
  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
